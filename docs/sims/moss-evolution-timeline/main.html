<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Moss Evolutionary Timeline</title>
    <link rel="stylesheet" href="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.css">
    <style>
        body { margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; background: #fafafa; }
        .container { max-width: 1100px; margin: 0 auto; padding: 10px; }
        h1 { text-align: center; color: #2e7d32; font-size: 22px; margin: 10px 0; }
        #timeline { width: 100%; height: 350px; border: 1px solid #ddd; border-radius: 8px; background: white; }
        .filter-bar { display: flex; gap: 8px; justify-content: center; margin: 10px 0; flex-wrap: wrap; }
        .filter-btn { padding: 6px 14px; border: 2px solid #ccc; border-radius: 20px; background: white; cursor: pointer; font-size: 13px; font-weight: bold; transition: all 0.2s; }
        .filter-btn:hover { opacity: 0.8; }
        .filter-btn.active { color: white; }
        .filter-btn.moss { border-color: #4caf50; color: #4caf50; }
        .filter-btn.moss.active { background: #4caf50; color: white; }
        .filter-btn.plant { border-color: #8d6e63; color: #8d6e63; }
        .filter-btn.plant.active { background: #8d6e63; color: white; }
        .filter-btn.extinction { border-color: #e53935; color: #e53935; }
        .filter-btn.extinction.active { background: #e53935; color: white; }
        .filter-btn.all { border-color: #1565c0; color: #1565c0; }
        .filter-btn.all.active { background: #1565c0; color: white; }
        #detail-panel { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-top: 10px; min-height: 60px; }
        #detail-panel h3 { margin: 0 0 5px 0; color: #2e7d32; }
        #detail-panel p { margin: 0; color: #555; line-height: 1.5; font-size: 14px; }
        .event-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; color: white; font-size: 11px; margin-right: 5px; }
        .back-link { display: block; text-align: center; margin: 10px; }

        /* vis-timeline custom item styles */
        .vis-item.moss-event { background-color: #4caf50; border-color: #2e7d32; color: white; border-radius: 6px; font-size: 12px; }
        .vis-item.plant-event { background-color: #8d6e63; border-color: #5d4037; color: white; border-radius: 6px; font-size: 12px; }
        .vis-item.extinction-event { background-color: #e53935; border-color: #c62828; color: white; border-radius: 6px; font-size: 12px; }
        .vis-item.selected { box-shadow: 0 0 8px rgba(0,0,0,0.3); }

        /* Green bar for moss persistence */
        .vis-item.moss-bar { background-color: rgba(76,175,80,0.2); border-color: #4caf50; border-radius: 4px; font-size: 11px; color: #2e7d32; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Moss Evolutionary Timeline</h1>
        <div class="filter-bar">
            <button class="filter-btn all active" onclick="filterEvents('all')">All Events</button>
            <button class="filter-btn moss" onclick="filterEvents('moss')">🌿 Moss Events</button>
            <button class="filter-btn plant" onclick="filterEvents('plant')">🌱 Plant Events</button>
            <button class="filter-btn extinction" onclick="filterEvents('extinction')">💥 Extinctions</button>
        </div>
        <div id="timeline"></div>
        <div id="detail-panel">
            <h3>Explore the Timeline</h3>
            <p>Click on any event to learn more. Scroll to zoom, drag to pan. Moss has persisted through every mass extinction for over 450 million years.</p>
        </div>
    </div>
    <br>
    <a class="back-link" href=".">Back to Lesson Plan</a>

    <script src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
    <script>
        const eventData = [
            {
                id: 1, content: 'First Land Plants', start: '-470000000-01-01',
                className: 'moss-event', category: 'moss',
                title: '470 Million Years Ago',
                detail: 'The earliest land plants, likely liverwort-like ancestors, colonized land from freshwater environments. These pioneers lacked roots and vascular tissue, relying on direct absorption of water — much like modern mosses.'
            },
            {
                id: 2, content: 'Early Mosses Diverge', start: '-450000000-01-01',
                className: 'moss-event', category: 'moss',
                title: '450 Million Years Ago',
                detail: 'Early mosses diverged from other bryophyte lineages. These ancient mosses were small, non-vascular plants that could survive desiccation and rehydrate when water returned — an adaptation that persists in modern species.'
            },
            {
                id: 3, content: 'First Vascular Plants', start: '-420000000-01-01',
                className: 'plant-event', category: 'plant',
                title: '420 Million Years Ago',
                detail: 'Vascular plants evolved xylem and phloem for water and nutrient transport. This innovation allowed plants to grow much taller than mosses, eventually leading to trees. Mosses, however, continued thriving in their own niches.'
            },
            {
                id: 4, content: 'Ferns Diversify', start: '-360000000-01-01',
                className: 'plant-event', category: 'plant',
                title: '360 Million Years Ago',
                detail: 'Ferns and seed ferns diversified rapidly during the late Devonian period. While these larger plants came to dominate forest canopies, mosses persisted as ground cover and colonizers of bare surfaces.'
            },
            {
                id: 5, content: 'Carboniferous Forests', start: '-300000000-01-01',
                className: 'plant-event', category: 'plant',
                title: '300 Million Years Ago',
                detail: 'The Carboniferous period saw vast swamp forests of giant ferns and lycopsids. Sphagnum-like mosses contributed to peat formation in these wetlands. The carbon stored during this period eventually became coal deposits.'
            },
            {
                id: 6, content: 'Permian Extinction', start: '-250000000-01-01',
                className: 'extinction-event', category: 'extinction',
                title: '250 Million Years Ago',
                detail: 'The Great Dying killed 96% of marine species and 70% of land vertebrates. Despite this catastrophe, mosses survived due to their desiccation tolerance, small size, and ability to reproduce from tiny fragments. Mosses helped recolonize barren landscapes.'
            },
            {
                id: 7, content: 'First Flowering Plants', start: '-130000000-01-01',
                className: 'plant-event', category: 'plant',
                title: '130 Million Years Ago',
                detail: 'Angiosperms (flowering plants) appeared and began their rapid diversification. Despite the rise of these complex plants, mosses maintained their ecological roles in moisture retention, erosion control, and nutrient cycling.'
            },
            {
                id: 8, content: 'K-Pg Extinction', start: '-66000000-01-01',
                className: 'extinction-event', category: 'extinction',
                title: '66 Million Years Ago',
                detail: 'The asteroid impact that ended the dinosaurs also devastated plant communities. Yet mosses, with their ability to survive extreme conditions and recolonize from spores, were among the first plants to recover, pioneering new ecosystems.'
            },
            {
                id: 9, content: 'Ice Age Ends', start: '-10000-01-01',
                className: 'moss-event', category: 'moss',
                title: '~10,000 Years Ago',
                detail: 'As glaciers retreated at the end of the last ice age, mosses were among the first organisms to colonize newly exposed rock and soil. Their role as pioneer species continues today wherever new surfaces are exposed.'
            },
            {
                id: 10, content: '12,000+ Species Today', start: '2000-01-01',
                className: 'moss-event', category: 'moss',
                title: 'Present Day',
                detail: 'Today over 12,000 moss species thrive on every continent, including Antarctica. Mosses continue to play vital roles in water retention, carbon sequestration, erosion control, and providing habitat for countless micro-organisms.'
            },
            {
                id: 11, content: 'Moss persists through it all', start: '-450000000-01-01', end: '2025-01-01',
                className: 'moss-bar', category: 'moss', type: 'background',
                detail: ''
            }
        ];

        // Use simple numeric years for vis-timeline
        const items = new vis.DataSet(eventData.map(e => {
            // Convert to approximate numeric dates vis-timeline can handle
            let startYear, endYear;
            const match = e.start.match(/^-?(\d+)/);
            if (e.start.startsWith('-')) {
                startYear = -parseInt(match[1]);
            } else {
                startYear = parseInt(match[1]);
            }

            const item = {
                id: e.id,
                content: e.content,
                start: new Date(Math.max(startYear, -271820) * (startYear < 0 ? 1 : 1), 0, 1),
                className: e.className,
                category: e.category,
                detail: e.detail,
                eventTitle: e.title
            };
            if (e.end) {
                const endMatch = e.end.match(/^-?(\d+)/);
                item.end = new Date(2025, 0, 1);
                item.type = 'range';
            }
            return item;
        }));

        // Since vis-timeline doesn't handle MYA well, use a simple numeric approach
        const timelineItems = new vis.DataSet([
            { id: 1, content: '🌿 First Land Plants<br><small>470 MYA</small>', start: 0, category: 'moss', className: 'moss-event', eventTitle: '470 Million Years Ago', detail: eventData[0].detail },
            { id: 2, content: '🌿 Early Mosses Diverge<br><small>450 MYA</small>', start: 20, category: 'moss', className: 'moss-event', eventTitle: '450 Million Years Ago', detail: eventData[1].detail },
            { id: 3, content: '🌱 First Vascular Plants<br><small>420 MYA</small>', start: 50, category: 'plant', className: 'plant-event', eventTitle: '420 Million Years Ago', detail: eventData[2].detail },
            { id: 4, content: '🌱 Ferns Diversify<br><small>360 MYA</small>', start: 110, category: 'plant', className: 'plant-event', eventTitle: '360 Million Years Ago', detail: eventData[3].detail },
            { id: 5, content: '🌱 Carboniferous Forests<br><small>300 MYA</small>', start: 170, category: 'plant', className: 'plant-event', eventTitle: '300 Million Years Ago', detail: eventData[4].detail },
            { id: 6, content: '💥 Permian Extinction<br><small>250 MYA</small>', start: 220, category: 'extinction', className: 'extinction-event', eventTitle: '250 Million Years Ago', detail: eventData[5].detail },
            { id: 7, content: '🌱 First Flowering Plants<br><small>130 MYA</small>', start: 340, category: 'plant', className: 'plant-event', eventTitle: '130 Million Years Ago', detail: eventData[6].detail },
            { id: 8, content: '💥 K-Pg Extinction<br><small>66 MYA</small>', start: 404, category: 'extinction', className: 'extinction-event', eventTitle: '66 Million Years Ago', detail: eventData[7].detail },
            { id: 9, content: '🌿 Ice Age Ends<br><small>10,000 ya</small>', start: 460, category: 'moss', className: 'moss-event', eventTitle: '~10,000 Years Ago', detail: eventData[8].detail },
            { id: 10, content: '🌿 12,000+ Species<br><small>Present</small>', start: 470, category: 'moss', className: 'moss-event', eventTitle: 'Present Day', detail: eventData[9].detail },
            { id: 11, content: 'Moss persists through it all', start: 20, end: 470, type: 'range', className: 'moss-bar', category: 'moss', detail: '' }
        ]);

        const allItems = timelineItems.get();

        const options = {
            width: '100%',
            height: '350px',
            showCurrentTime: false,
            zoomMin: 50000000,
            zoomMax: 20000000000,
            margin: { item: 15 },
            orientation: 'top',
            type: 'point',
            stack: true,
            tooltip: { followMouse: true },
            format: {
                minorLabels: function() { return ''; },
                majorLabels: function() { return ''; }
            }
        };

        const container = document.getElementById('timeline');
        const timeline = new vis.Timeline(container, timelineItems, options);

        // Click handler
        timeline.on('select', function(properties) {
            if (properties.items.length > 0) {
                const item = timelineItems.get(properties.items[0]);
                if (item && item.detail) {
                    const panel = document.getElementById('detail-panel');
                    const tagColor = item.category === 'moss' ? '#4caf50' : item.category === 'extinction' ? '#e53935' : '#8d6e63';
                    const tagLabel = item.category === 'moss' ? 'Moss Event' : item.category === 'extinction' ? 'Extinction' : 'Plant Evolution';
                    panel.innerHTML = `
                        <h3><span class="event-tag" style="background:${tagColor}">${tagLabel}</span> ${item.eventTitle || ''}</h3>
                        <p>${item.detail}</p>
                    `;
                }
            }
        });

        // Filter function
        function filterEvents(category) {
            // Update button states
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.filter-btn.${category}`).classList.add('active');

            if (category === 'all') {
                timelineItems.clear();
                timelineItems.add(allItems);
            } else {
                const filtered = allItems.filter(item => item.category === category);
                timelineItems.clear();
                timelineItems.add(filtered);
            }
        }
    </script>
</body>
</html>
