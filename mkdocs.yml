theme:
  name: material
  palette:
    primary: 'green'
    accent: 'white'
  include_sidebar: true
  logo: img/welcome-192.png
  favicon: img/favicon.ico
  features:
    - content.code.copy
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - toc.follow
    - navigation.top
    - navigation.footer
    - content.action.edit

plugins:
  - search
  - social
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      auto_caption: false
      caption_position: bottom

markdown_extensions:
  - md_in_html
  - attr_list
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      linenums: true
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - css/extra.css
  - css/mascot.css

extra_javascript:
  - js/extra.js
  # This configuration file allows us to use the $ and $$ to specify and equation.
  # We never use backslash due to conflict with the []() Markdown format
  - js/mathjax-config.js
  # For a Biology textbook we use chemistry equations
  # We add the chemical markdown extension to MathJax
  # It is not included in the default MathJax bundle, so we need to load the full TeX bundle
  - https://unpkg.com/mathjax@3/es5/tex-chtml.js

watch:
  - docs
  - mkdocs.yml

exclude_docs: |
  sims/bryophyte-comparison/image-prompt.md
  sims/moss-cell-structure/image-prompt.md
  sims/moss-gametophyte-anatomy/image-prompt.md
  sims/moss-sporophyte-structure/image-prompt.md

extra:
  generator: false
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  textbook_name: Moss
  textbook_version: "1.0"
