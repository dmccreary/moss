<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Lawn Carbon Footprint Comparison</title>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; }
        main { max-width: 100%; padding: 10px; }
        h2 { text-align: center; color: #333; margin: 8px 0; font-size: 20px; }
        .chart-container { position: relative; width: 100%; max-width: 750px; margin: 0 auto; }
        .toggle-container { text-align: center; margin: 8px 0; }
        .toggle-btn {
            padding: 6px 16px; margin: 0 4px; border: 2px solid #888; border-radius: 20px;
            background: #f0f0f0; cursor: pointer; font-size: 12px; font-weight: bold;
        }
        .toggle-btn.active { background: #4CAF50; color: white; border-color: #388E3C; }
        .note { text-align: center; color: #888; font-size: 11px; margin-top: 4px; }
        .legend-note { text-align: center; color: #666; font-size: 12px; margin: 4px 0; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<main>
    <h2>Annual Carbon Footprint: Turf Grass vs. Moss Lawn</h2>
    <div class="toggle-container">
        <button class="toggle-btn active" id="btnM2" onclick="setScale('m2')">Per 200 m&sup2;</button>
        <button class="toggle-btn" id="btnAcre" onclick="setScale('acre')">Per Acre</button>
    </div>
    <div class="chart-container">
        <canvas id="carbonChart"></canvas>
    </div>
    <p class="legend-note">Warm colors = CO&#8322; emissions &nbsp;|&nbsp; Green = carbon sequestration (negative emissions)</p>
    <p class="note">Hover over segments for details. Click legend items to toggle categories.</p>
</main>
<script>
const ctx = document.getElementById('carbonChart').getContext('2d');

const dataM2 = {
    turf: { mowing: 40, fertilizer: 80, n2o: 150, irrigation: 30, equipment: 20 },
    moss: { sequestration: -10 }
};

const acreMultiplier = 20.235;
let currentScale = 'm2';

function getScaledData() {
    let m = currentScale === 'acre' ? acreMultiplier : 1;
    return {
        turf: {
            mowing: Math.round(dataM2.turf.mowing * m),
            fertilizer: Math.round(dataM2.turf.fertilizer * m),
            n2o: Math.round(dataM2.turf.n2o * m),
            irrigation: Math.round(dataM2.turf.irrigation * m),
            equipment: Math.round(dataM2.turf.equipment * m)
        },
        moss: { sequestration: Math.round(dataM2.moss.sequestration * m) }
    };
}

function buildChart() {
    let d = getScaledData();
    let unit = currentScale === 'acre' ? '/acre' : '/200 m\u00B2';
    return {
        type: 'bar',
        data: {
            labels: ['Turf Grass Lawn', 'Moss Lawn'],
            datasets: [
                { label: 'Mowing (gasoline)', data: [d.turf.mowing, 0], backgroundColor: '#B71C1C', tooltip_desc: 'CO\u2082 from gasoline-powered mowing' },
                { label: 'Fertilizer production', data: [d.turf.fertilizer, 0], backgroundColor: '#E65100', tooltip_desc: 'CO\u2082 from manufacturing synthetic fertilizer' },
                { label: 'N\u2082O from fertilizer', data: [d.turf.n2o, 0], backgroundColor: '#F9A825', tooltip_desc: 'Nitrous oxide released from applied fertilizer (298x CO\u2082 potency)' },
                { label: 'Irrigation pumping', data: [d.turf.irrigation, 0], backgroundColor: '#1565C0', tooltip_desc: 'Energy to pump irrigation water' },
                { label: 'Other equipment', data: [d.turf.equipment, 0], backgroundColor: '#757575', tooltip_desc: 'Leaf blowers, edgers, spreaders' },
                { label: 'Carbon sequestration', data: [0, d.moss.sequestration], backgroundColor: '#2E7D32', tooltip_desc: 'Net carbon captured and stored by moss' }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: true, aspectRatio: 1.6,
            plugins: {
                legend: { position: 'bottom', labels: { font: { size: 11 }, boxWidth: 14 } },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            let val = context.parsed.y;
                            let sign = val >= 0 ? '+' : '';
                            return context.dataset.label + ': ' + sign + val + ' kg CO\u2082e' + unit;
                        },
                        afterLabel: function(context) { return context.dataset.tooltip_desc || ''; }
                    }
                }
            },
            scales: {
                x: { stacked: true, grid: { display: false } },
                y: { stacked: true, title: { display: true, text: 'kg CO\u2082-equivalent per year', font: { size: 13 } }, grid: { color: '#eee' } }
            }
        }
    };
}

let chart = new Chart(ctx, buildChart());

function setScale(scale) {
    currentScale = scale;
    document.getElementById('btnM2').classList.toggle('active', scale === 'm2');
    document.getElementById('btnAcre').classList.toggle('active', scale === 'acre');
    chart.destroy();
    chart = new Chart(ctx, buildChart());
}
</script>
<br/>

</body>
</html>
